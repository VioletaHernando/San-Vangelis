<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz Santo Vangelis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ffe6f0, #ffccd9);
      font-family: 'Patrick Hand', cursive;
      text-align: center;
      margin: 0;
      overflow: hidden;
      animation: backgroundShift 10s ease infinite alternate;
    }

    @keyframes backgroundShift {
      0% {background: linear-gradient(135deg, #ffe6f0, #ffccd9);}
      50% {background: linear-gradient(135deg, #ffd1dc, #ffb3c6);}
      100% {background: linear-gradient(135deg, #ffe6f0, #ffccd9);}
    }

    h1 {
      font-size: 3em;
      color: #d6336c;
      text-shadow: 2px 2px #fff;
      margin-bottom: 0;
    }

    p {
      font-size: 1.5em;
      margin: 10px;
      color: #880e4f;
    }

    .btn {
      padding: 12px 25px;
      font-size: 1.3em;
      margin: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      color: #fff;
      background: linear-gradient(135deg, #d6336c, #ff4081);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    /* Animación rebote al pulsar */
    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <h1>Feliz San Vangelis 💖</h1>
  <p>Χρόνια πολλά Βαγγέλη ❤️</p>
  <p>¿Quién es la mejor novia del mundo?</p>

  <div>
    <button class="btn" onclick="celebrar()">Violeta</button>
    <button class="btn" onclick="celebrar()">Tú</button>
    <button class="btn" onclick="celebrar()">Mi novia</button>
    <button class="btn" id="trampa">Otra mujer</button>
  </div>

  <canvas id="confetti" style="position:fixed;pointer-events:none;top:0;left:0;width:100%;height:100%;"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    const trampa = document.getElementById("trampa");

    // Botón que se escapa suavemente
    trampa.addEventListener("mouseover", () => {
      trampa.style.position = "absolute";
      trampa.style.transition = "all 0.3s ease";
      trampa.style.top = Math.random() * (window.innerHeight - 60) + "px";
      trampa.style.left = Math.random() * (window.innerWidth - 120) + "px";
    });

    // Función al acertar
    function celebrar() {
      confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 },
        shapes: ['circle', 'heart'],
        colors: ['#d6336c', '#ff4081', '#ff6f91', '#ff1c68']
      });
      // Redirige a la página de amor después de 1 segundo
      setTimeout(() => {
        window.location.href = "amor.html";
      }, 1000);
    }
  </script>
</body>
</html>
