<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Te quiero agápi mou</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ffe6f0, #ffccd9);
      font-family: 'Patrick Hand', cursive;
      text-align: center;
      margin: 0;
      overflow: auto;
      padding: 20px;
    }

    h1 {
      font-size: 3em;
      color: #d6336c;
      text-shadow: 2px 2px #fff;
    }

    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .galeria img {
      width: 180px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .galeria img:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <h1>Te quiero αγάπη μου ❤️ </h1>

  <div class="galeria">
    <img src="amor1.jpeg" alt="Amor 1">
    <img src="amor2.JPG" alt="Amor 2">
    <img src="amor3.jpeg" alt="Amor 3">
    <img src="amor4.jpeg" alt="Amor 4">
    <img src="amor5.jpeg" alt="Amor 5">
  </div>
</body>
</html>
