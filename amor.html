<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Te quiero agápi mou</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ffe6f0, #ffccd9);
      font-family: 'Patrick Hand', cursive;
      text-align: center;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      font-size: 3em;
      color: #d6336c;
      text-shadow: 2px 2px #fff;
    }

    img {
      margin-top: 20px;
      width: 300px;
      max-width: 80%;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <h1>Te quiero ❤️ Αγαπώ σε (Agápi mou)</h1>
  <img src="amor.png" alt="Te quiero">
</body>
</html>
